version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: eventlinkr
      POSTGRES_USER: eventlinkr
      POSTGRES_PASSWORD: eventlinkr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  user-service:
    build: 
      context: ./user-service
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventlinkr
      - SPRING_DATASOURCE_USERNAME=eventlinkr
      - SPRING_DATASOURCE_PASSWORD=eventlinkr_password

  event-service:
    build: 
      context: ./event-service
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventlinkr
      - SPRING_DATASOURCE_USERNAME=eventlinkr
      - SPRING_DATASOURCE_PASSWORD=eventlinkr_password

volumes:
  postgres_data: